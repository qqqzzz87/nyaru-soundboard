<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Nyaru Soundboard</title>

  <!-- Icon 套件 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    /* ===== 社群列 ===== */
    .social-bar {
      
      z-index: 20;

      display: flex;
      
      gap: 20px;

      padding: 10px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
    }

    .social-bar a {
      font-size: 22px;
      color: white;
      transition: all 0.25s ease;
    }

    .social-bar a:hover {
      transform: scale(1.2) translateY(-2px);
    }

    .social-bar a.yt:hover { color: #ff0000; }
    .social-bar a.x:hover { color: #1da1f2; }
    .social-bar a.twitch:hover { color: #9146ff; }
    .social-bar a.threads:hover { color: #ffffff; }

    /* ===== 上方分類列 ===== */
    .topbar {
      padding: 15px;
      background: #1e293b;
      
      top: 0; /* 👈 關鍵：避免被社群列蓋住 */
      z-index: 10;
    }

    .topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between; /* 左右分開 */
    }

    .topbar h1 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    #categories {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 999px;
      background: #334155;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .category-btn.active,
    .category-btn:hover {
      background: #22c55e;
    }

    /* ===== 音效按鈕 ===== */
    .grid {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .sound-btn {
      background: #1e293b;
      border: none;
      padding: 20px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }

    .sound-btn:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .sound-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  

  <!-- 🔽 分類列 -->
  <header class="topbar">
    <h1>🎧 Nyaru Soundboard</h1>

    <!-- 🔥 社群列 -->
  <div class="social-bar">
    <a href="https://www.youtube.com/@Nyaru_NeSh1" target="_blank" class="yt">
      <i class="fab fa-youtube"></i>
    </a>

    <a href="https://x.com/Nyaru_nesh1" target="_blank" class="x">
      <i class="fab fa-x-twitter"></i>
    </a>

    <a href="https://www.twitch.tv/nyaru_nesh1" target="_blank" class="twitch">
      <i class="fab fa-twitch"></i>
    </a>

    <a href="https://www.threads.com/@nyaru_nesh1" target="_blank" class="threads">
      <i class="fab fa-threads"></i>
    </a>
  </div>
    <div id="categories"></div>
  </header>

  <main>
    <div id="soundGrid" class="grid"></div>
  </main>

  <script>
    const soundData = {
      精選: [
        { name: "歐買嘎都", file: "歐買嘎都.mp3" },
        { name: "笑聲", file: "sounds/laugh.mp3" }
      ],
      動漫: [
        { name: "啊啊啊", file: "sounds/a.mp3" }
      ],
      搞笑: [
        { name: "蛤", file: "sounds/huh.mp3" }
      ]
    };

    let currentCategory = "精選";

    const categoryContainer = document.getElementById("categories");
    const grid = document.getElementById("soundGrid");

    function init() {
      renderCategories();
      renderSounds();
    }

    function renderCategories() {
      categoryContainer.innerHTML = "";

      Object.keys(soundData).forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.className = "category-btn";

        if (cat === currentCategory) {
          btn.classList.add("active");
        }

        btn.onclick = () => {
          currentCategory = cat;
          renderCategories();
          renderSounds();
        };

        categoryContainer.appendChild(btn);
      });
    }

    function renderSounds() {
      grid.innerHTML = "";

      soundData[currentCategory].forEach(sound => {
        const btn = document.createElement("button");
        btn.className = "sound-btn";
        btn.textContent = sound.name;

        btn.onclick = () => playSound(sound.file);

        grid.appendChild(btn);
      });
    }

    function playSound(src) {
      const audio = new Audio(src);
      audio.play();
    }

    init();
  </script>

</body>
</html>
