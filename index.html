<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Nyaru Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    .topbar {
      padding: 15px;
      background: #1e293b;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar h1 {
      margin: 0 0 10px;
    }

    #categories {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 999px;
      background: #334155;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .category-btn.active,
    .category-btn:hover {
      background: #22c55e;
    }

    .grid {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .sound-btn {
      background: #1e293b;
      border: none;
      padding: 20px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }

    .sound-btn:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .sound-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <header class="topbar">
    <h1>🎧 Nyaru Soundboard</h1>
    <div id="categories"></div>
  </header>

  <main>
    <div id="soundGrid" class="grid"></div>
  </main>

  <script>
    // 🔊 改這裡就好
    const soundData = {
      精選: [
        { name: "歐買嘎都", file: "歐買嘎都.mp3" },
        { name: "笑聲", file: "sounds/laugh.mp3" }
      ],
      動漫: [
        { name: "啊啊啊", file: "sounds/a.mp3" }
      ],
      搞笑: [
        { name: "蛤", file: "sounds/huh.mp3" }
      ]
    };

    let currentCategory = "精選";

    const categoryContainer = document.getElementById("categories");
    const grid = document.getElementById("soundGrid");

    function init() {
      renderCategories();
      renderSounds();
    }

    function renderCategories() {
      categoryContainer.innerHTML = "";

      Object.keys(soundData).forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.className = "category-btn";

        if (cat === currentCategory) {
          btn.classList.add("active");
        }

        btn.onclick = () => {
          currentCategory = cat;
          renderCategories();
          renderSounds();
        };

        categoryContainer.appendChild(btn);
      });
    }

    function renderSounds() {
      grid.innerHTML = "";

      soundData[currentCategory].forEach(sound => {
        const btn = document.createElement("button");
        btn.className = "sound-btn";
        btn.textContent = sound.name;

        btn.onclick = () => playSound(sound.file);

        grid.appendChild(btn);
      });
    }

    function playSound(src) {
      const audio = new Audio(src);
      audio.play();
    }

    init();
  </script>

</body>
</html>
