<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Nyaru Soundboard</title>

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #eaf6fb;
      color: #2b2b2b;
    }

    /* ===== Header ===== */
    .topbar {
      padding: 12px 16px;
      background: rgba(173, 216, 230, 0.6);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .title-icon {
      font-size: 32px;
      margin-right: 6px;
    }

    /* ===== 社群 ===== */
    .social-bar {
      display: flex;
      gap: 16px;
    }

    .social-bar a {
      font-size: 22px;
      color: #6b7280;
      transition: 0.25s;
    }

    .social-bar a:hover {
      transform: scale(1.2) translateY(-2px);
      text-shadow: 0 0 8px currentColor;
    }

    .social-bar a.yt:hover { color: #ff6b6b; }
    .social-bar a.x:hover { color: #60a5fa; }
    .social-bar a.twitch:hover { color: #a78bfa; }
    .social-bar a.threads:hover { color: #94a3b8; }

    /* ===== 分類 ===== */
    #categories {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 999px;
      background: #dbeafe;
      color: #3b4a5a;
      cursor: pointer;
      transition: 0.2s;
    }

    .category-btn.active,
    .category-btn:hover {
      background: #93c5fd;
      color: white;
    }

    /* ===== 音效 ===== */
    .grid {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .sound-btn {
      background: #ffffff;
      color: #3b4a5a;
      border: none;
      padding: 20px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .sound-btn:hover {
      transform: scale(1.05);
      background: #e0f2fe;
    }

    .sound-btn:active {
      transform: scale(0.95);
    }

    /* 📱 手機版 */
    @media (max-width: 600px) {

      .topbar h1 {
        font-size: 18px;
      }

      .title-icon {
        font-size: 22px;
      }

      .social-bar {
        gap: 10px;
      }

      .social-bar a {
        font-size: 18px;
      }

      .category-btn {
        font-size: 12px;
        padding: 5px 10px;
      }

      .sound-btn {
        font-size: 12px;
        padding: 15px 8px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar-row">
      <h1><span class="title-icon">🎧</span>Nyaru Soundboard</h1>

      <div class="social-bar">
        <a href="https://www.youtube.com/@Nyaru_NeSh1" target="_blank" class="yt">
          <i class="fab fa-youtube"></i>
        </a>
        <a href="https://x.com/Nyaru_nesh1" target="_blank" class="x">
          <i class="fab fa-x-twitter"></i>
        </a>
        <a href="https://www.twitch.tv/nyaru_nesh1" target="_blank" class="twitch">
          <i class="fab fa-twitch"></i>
        </a>
        <a href="https://www.threads.com/@nyaru_nesh1" target="_blank" class="threads">
          <i class="fab fa-threads"></i>
        </a>
      </div>
    </div>

    <div id="categories"></div>
  </header>

  <main>
    <div id="soundGrid" class="grid"></div>
  </main>

  <script>
    const soundData = {
      動漫: [
        { name: "啊啊啊", file: "sounds/a.mp3" }
      ],
      搞笑: [
        { name: "蛤", file: "sounds/huh.mp3" }
      ]
    };

    let currentCategory = "動漫";

    const categoryContainer = document.getElementById("categories");
    const grid = document.getElementById("soundGrid");

    function init() {
      renderCategories();
      renderSounds();
    }

    function renderCategories() {
      categoryContainer.innerHTML = "";

      Object.keys(soundData).forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.className = "category-btn";

        if (cat === currentCategory) {
          btn.classList.add("active");
        }

        btn.onclick = () => {
          currentCategory = cat;
          renderCategories();
          renderSounds();
        };

        categoryContainer.appendChild(btn);
      });
    }

    function renderSounds() {
      grid.innerHTML = "";

      soundData[currentCategory].forEach(sound => {
        const btn = document.createElement("button");
        btn.className = "sound-btn";
        btn.textContent = sound.name;

        btn.onclick = () => playSound(sound.file);

        grid.appendChild(btn);
      });
    }

    function playSound(src) {
      const audio = new Audio(src);
      audio.play();
    }

    init();
  </script>

</body>
</html>
