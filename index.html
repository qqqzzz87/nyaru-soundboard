<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Nyaru Soundboard</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #eaf6fb;
      color: #2b2b2b;
    }

    /* ===== Header ===== */
    .topbar {
      padding: 12px 16px;
      background: rgba(173, 216, 230, 0.6);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
    }

    .title-icon {
      font-size: 32px;
      margin-right: 6px;
    }

    /* ===== 社群 ===== */
    .social-bar {
      display: flex;
      gap: 14px;
    }

    .social-bar a {
      font-size: 20px;
      color: #6b7280;
      transition: 0.25s;
    }

    .social-bar a:hover {
      transform: scale(1.2);
      text-shadow: 0 0 8px currentColor;
    }

    /* ===== 搜尋欄 ===== */
    .search-box {
      margin-top: 10px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      outline: none;
      font-size: 14px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* ===== 音效區 ===== */
    .grid {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
    }

    /* 🎀 可愛按鈕 */
    .sound-btn {
      background: linear-gradient(145deg, #ffffff, #e0f2fe);
      color: #3b4a5a;
      border: none;
      padding: 18px 10px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 14px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
      position: relative;
    }

    /* ✨ Hover 動畫 */
    .sound-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 18px rgba(0,0,0,0.12);
      background: linear-gradient(145deg, #ffffff, #bae6fd);
    }

    .sound-btn:active {
      transform: scale(0.95);
    }

    /* 🎀 小裝飾點點 */
    .sound-btn::after {
      content: "✦";
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 10px;
      opacity: 0.5;
    }

    /* 📱 手機 */
    @media (max-width: 600px) {
      .topbar h1 { font-size: 18px; }
      .title-icon { font-size: 22px; }
      .sound-btn { font-size: 12px; padding: 14px 8px; }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar-row">
      <h1><span class="title-icon">🎧</span>Nyaru Soundboard</h1>

      <div class="social-bar">
        <a href="https://www.youtube.com/@Nyaru_NeSh1" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://x.com/Nyaru_nesh1" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="https://www.twitch.tv/nyaru_nesh1" target="_blank"><i class="fab fa-twitch"></i></a>
      </div>
    </div>

    <!-- 🔍 搜尋 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜尋音效...">
    </div>
  </header>

  <main>
    <div id="soundGrid" class="grid"></div>
  </main>

  <script>
    const soundData = [
      { name: "歐買嘎都", file: "歐買嘎都.mp3" },
      { name: "蛤", file: "sounds/huh.mp3" },
      { name: "笑聲", file: "sounds/laugh.mp3" }
    ];

    const grid = document.getElementById("soundGrid");
    const searchInput = document.getElementById("searchInput");

    function renderSounds(filter = "") {
      grid.innerHTML = "";

      const filtered = soundData.filter(s =>
        s.name.toLowerCase().includes(filter.toLowerCase())
      );

      filtered.forEach(sound => {
        const btn = document.createElement("button");
        btn.className = "sound-btn";
        btn.textContent = sound.name;

        btn.onclick = () => {
          const audio = new Audio(sound.file);
          audio.play();
        };

        grid.appendChild(btn);
      });
    }

    searchInput.addEventListener("input", e => {
      renderSounds(e.target.value);
    });

    renderSounds();
  </script>

</body>
</html>
